name: CI

# 跑离线冒烟自检（59 项）+ pyflakes 静态检查。绿了 PR 才会被自动合并（配合 PR_AUTOMERGE）。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 准备 Python 环境（自带 venv，不依赖 setup-python 预编译包）
        run: |
          command -v python3 >/dev/null || { apt-get update && apt-get install -y python3; }
          python3 -m venv .venv-ci 2>/dev/null || {
            apt-get update && apt-get install -y python3-venv && python3 -m venv .venv-ci;
          }
          .venv-ci/bin/python -m pip install -q --upgrade pip
          .venv-ci/bin/python --version

      - name: 安装依赖
        run: .venv-ci/bin/pip install -q -r requirements.txt pyflakes

      - name: Lint（pyflakes：只在出现 undefined name 时失败；re-export 的"未用导入"不算）
        run: |
          out=$(.venv-ci/bin/python -m pyflakes *.py || true)
          echo "$out"
          if echo "$out" | grep -qi "undefined name"; then
            echo "::error::pyflakes 发现 undefined name"
            exit 1
          fi

      - name: 冒烟自检（59 项，离线、不连 Matrix/不调 claude）
        run: .venv-ci/bin/python tests/smoke.py
