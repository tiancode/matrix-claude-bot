name: CI

# 离线冒烟自检 + pyflakes。绿了 PR 才会被自动合并（配合 PR_AUTOMERGE）。
# 这台 runner(pi-runner) 所在网络墙了 github.com / pypi.org，且容器内解析不了 pi.lan：
#   - 不用任何 uses: 动作（会去 github 拉取而失败），改从本地 Gitea 的 IP/网关 clone；
#   - pip 走清华镜像绕开 pypi 封锁。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: 检出（容器内解析不了 pi.lan，直接连 Gitea 的 IP）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for h in 192.168.1.4:3000 host.docker.internal:3000; do
            curl -s -m 6 -o /dev/null -w "  probe $h -> %{http_code}\n" "http://$h/api/v1/version" || echo "  probe $h -> 不可达"
          done
          ok=0
          for h in 192.168.1.4:3000 host.docker.internal:3000 pi.lan:3000; do
            u="http://x-access-token:${GH_TOKEN}@${h}/${GITHUB_REPOSITORY}.git"
            if git clone "$u" . 2>/dev/null; then echo "✔ cloned via $h"; ok=1; break; fi
            find . -mindepth 1 -delete 2>/dev/null || true
          done
          [ "$ok" = 1 ] || { echo "::error::所有候选地址都无法 clone 本地 Gitea"; exit 1; }
          git checkout -q "$GITHUB_SHA" || echo "WARN: checkout $GITHUB_SHA 失败，用默认 HEAD"
          echo "HEAD=$(git rev-parse --short HEAD)"

      - name: 依赖 + lint + 冒烟（pip 走清华镜像）
        run: |
          MIRROR="-i https://pypi.tuna.tsinghua.edu.cn/simple --timeout 60 --retries 3"
          if python3 -m venv .venv-ci 2>/dev/null; then PY=.venv-ci/bin/python; else PY=python3; fi
          $PY -m pip install -q --upgrade $MIRROR pip || true
          $PY -m pip install -q $MIRROR -r requirements.txt pyflakes \
            || $PY -m pip install -q --break-system-packages $MIRROR -r requirements.txt pyflakes
          $PY --version
          echo "--- pyflakes（只在 undefined name 时失败；re-export 的未用导入不算）---"
          out=$($PY -m pyflakes *.py || true); echo "$out"
          if echo "$out" | grep -qi "undefined name"; then echo "::error::pyflakes 发现 undefined name"; exit 1; fi
          echo "--- 冒烟自检（离线，不连 Matrix/不调 claude）---"
          $PY tests/smoke.py
